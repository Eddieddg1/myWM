[General]
border_width = 2
focus_color = "#FF0000"

[Keybindings]
mod+Return = launch_terminal
mod+q = close_window
mod+Left = move_window_left
mod+Right = move_window_right

[Appearance]
background_image = /path/to/custom/image.png
background_color = #000000  # Fallback color

[Rules]
# Format: window_class = {property=value}
firefox = {
    floating = true
    width = 800
    height = 600
}

[Autostart]
compton &
feh --bg-scale /path/to/wallpaper.jpg &
